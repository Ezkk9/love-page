<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Почему я тебя люблю</title>

<style>

body{
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  text-align:center;
  margin:0;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  background-size: 400% 400%;
  animation: gradientAnim 20s ease infinite;
  position: relative;
}

@keyframes gradientAnim{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  color:white;
  font-size:48px;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
  margin:0 0 20px 0;
  z-index:2;
  position:relative;
}

button{
  padding:20px 40px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:white;
  color:black;
  cursor:pointer;
  transition:0.3s;
  z-index:2;
  position:relative;
}

button:hover{
  transform:scale(1.1);
}

#reason{
  margin-top:30px;
  font-size:38px; /* ещё больше */
  color:white;
  max-width:600px;
  animation:fade 0.5s;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
  z-index:2;
  position:relative;
}

#counter{
  margin-top:10px;
  font-size:34px; /* ещё больше */
  color:white;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
  z-index:2;
  position:relative;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.heart{
  position:absolute;
  color:white;
  animation:fall linear forwards;
  z-index:1; /* позади текста */
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:0.6;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

</style>

</head>

<body>

<h1>Почему я тебя люблю ❤️</h1>

<button onclick="nextReason()">Следующая причина</button>

<div id="reason"></div>
<div id="counter"></div>

<script>

let reasons = [
  "Ты заставляешь меня улыбаться",
  "С тобой спокойно",
  "Ты поддерживаешь меня",
  "Ты очень красивая",
  "С тобой интересно говорить",
  "Ты делаешь мои дни лучше",
  "Ты понимаешь меня",
  "С тобой я счастлив",
  "Ты особенная",
  "Просто потому что это ты ❤️"
]

let index = 0

function nextReason(){
  if(index < reasons.length){
    document.getElementById("reason").innerText = reasons[index]
    document.getElementById("counter").innerText =
      "Причина " + (index+1) + " из " + reasons.length
    index++
  }else{
    document.getElementById("reason").innerText =
      "Это только часть причин ❤️"
    document.getElementById("counter").innerText = ""
  }
}

function createHeart(){
  let heart = document.createElement("div")
  heart.className = "heart"
  heart.innerText = "❤️"

  heart.style.left = Math.random()*100 + "vw"
  heart.style.fontSize = (Math.random()*15+10) + "px" // меньше
  heart.style.opacity = Math.random()*0.3 + 0.3 // ещё прозрачнее
  heart.style.animationDuration = (Math.random()*6+6) + "s" // медленнее
  heart.style.top = "-50px"
  heart.style.color = `hsl(${Math.random()*360}, 100%, 80%)`
  heart.style.transform = `rotate(${Math.random()*360}deg)`

  document.body.appendChild(heart)
  setTimeout(()=>heart.remove(),12000)
}

// больше сердечек
for(let i=0;i<10;i++){
  setInterval(createHeart,300)
}

</script>

</body>
</html>
