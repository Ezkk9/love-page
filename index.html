<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Почему я тебя люблю</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  text-align:center;
}

h1{
  color:white;
  font-size:48px; /* увеличенный шрифт */
}

button{
  padding:20px 40px; /* увеличена кнопка */
  font-size:20px;
  border:none;
  border-radius:12px;
  background:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

#reason{
  margin-top:30px;
  font-size:28px; /* увеличенный текст */
  color:white;
  max-width:500px;
  animation:fade 0.5s;
}

#counter{
  margin-top:10px;
  color:white;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

.heart{
  position:absolute;
  color:white;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

</style>

</head>

<body>

<h1>Почему я тебя люблю ❤️</h1>

<button onclick="nextReason()">Следующая причина</button>

<div id="reason"></div>
<div id="counter"></div>

<script>

let reasons = [
  "Ты заставляешь меня улыбаться",
  "С тобой спокойно",
  "Ты поддерживаешь меня",
  "Ты очень красивая",
  "С тобой интересно говорить",
  "Ты делаешь мои дни лучше",
  "Ты понимаешь меня",
  "С тобой я счастлив",
  "Ты особенная",
  "Просто потому что это ты ❤️"
]

let index = 0

function nextReason(){
  if(index < reasons.length){
    document.getElementById("reason").innerText = reasons[index]
    document.getElementById("counter").innerText =
      "Причина " + (index+1) + " из " + reasons.length
    index++
  }else{
    document.getElementById("reason").innerText =
      "Это только часть причин ❤️"
  }
}

function createHeart(){
  let heart = document.createElement("div")
  heart.className = "heart"
  heart.innerText = "❤️"

  heart.style.left = Math.random()*100 + "vw"
  heart.style.fontSize = (Math.random()*30+20) + "px"
  heart.style.opacity = Math.random()*0.5 + 0.5 // полупрозрачные
  heart.style.animationDuration = (Math.random()*3+5) + "s" // 5–8 секунд
  heart.style.color = `hsl(${Math.random()*360}, 100%, 80%)` // случайный цвет
  heart.style.transform = `rotate(${Math.random()*360}deg)` // случайный поворот

  document.body.appendChild(heart)

  setTimeout(()=>heart.remove(),8000)
}

setInterval(createHeart,300)

</script>

</body>
</html>
