<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Почему я тебя люблю</title>

<style>

body{
  font-family: Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  text-align:center;
  margin:0;
  background: url('IMG_3391.jpeg') no-repeat center center;
  background-size: cover;
  position: relative;
}

h1{
  color:white;
  font-size:48px;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
  margin:0 0 20px 0;
  z-index:2;
  position:relative;
}

button{
  padding:20px 40px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:white;
  color:black;
  cursor:pointer;
  transition:0.3s;
  z-index:2;
  position:relative;
}

button:hover{
  transform:scale(1.1);
}

#reason, #counter{
  z-index:2;
  position:relative;
}

#reason-box{
  background: rgba(0,0,0,0.5); /* почти прозрачный чёрный фон */
  border-radius:15px;
  padding:20px 30px;
  max-width:600px;
  margin-top:20px;
}

#reason{
  font-size:38px;
  color:white;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
}

#counter{
  font-size:34px;
  color:white;
  margin-top:10px;
  -webkit-text-stroke: 1px black;
  text-shadow: -1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
}

.heart{
  position:absolute;
  color:white;
  animation:fall linear forwards;
  z-index:1;
  opacity:0.3;
}

@keyframes fall{
  0%{
    transform:translateY(-10vh) rotate(0deg);
    opacity:0.3;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<h1>Почему я тебя люблю ❤️</h1>

<button onclick="nextReason()">Следующая причина</button>

<div id="reason-box">
  <div id="reason"></div>
  <div id="counter"></div>
</div>

<script>
let reasons = [
  "Ты заставляешь меня улыбаться каждый день.",
  "С тобой я чувствую себя спокойно и уверенно.",
  "Ты поддерживаешь меня даже в трудные моменты.",
  "Ты очень красивая, внутри и снаружи.",
  "С тобой интересно говорить обо всём.",
  "Ты делаешь мои дни ярче.",
  "Ты понимаешь меня без слов.",
  "С тобой я чувствую себя счастливым.",
  "Ты особенная для меня.",
  "Просто потому что это ты ❤️",
  "Ты дала мне понять, что значит любовь.",
  "Ты моя будущая жена.",
  "Нашим детям достанутся безумно красивые глаза.",
  "Ты самая милая девушка в мире.",
  "Ты умеешь поддержать и поднять настроение.",
  "С тобой я хочу делиться всем.",
  "Ты вдохновляешь меня быть лучше.",
  "Я обожаю твой смех.",
  "Ты умеешь делать простые моменты особенными.",
  "Ты невероятно добрая и заботливая.",
  "Я ценю твою честность и искренность.",
  "Ты всегда находишь слова, чтобы меня успокоить.",
  "Ты наполняешь мою жизнь радостью.",
  "С тобой я хочу строить будущее.",
  "Ты умеешь слушать и слышать.",
  "Ты моя самая большая поддержка.",
  "Ты моя маленькая принцесса.",
  "Твои поцелуи словно эйфория.",
  "Ты лучшее, что случалось со мной за всё время.",
  "Ты исполняешь все мои желания.",
  "Ты стала звездой, упавшей в моей спальне.",
  "Ты сюжет моих слов и мыслей.",
  "Ради тебя я способен на убийство)."
];

let index = 0;

function nextReason(){
  if(index < reasons.length){
    document.getElementById("reason").innerText = reasons[index];
    document.getElementById("counter").innerText =
      "Причина " + (index+1) + " из " + reasons.length;
    index++;
  }else{
    document.getElementById("reason").innerText =
      "Это только часть причин ❤️";
    document.getElementById("counter").innerText = "";
  }
}

function createHeart(){
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*30+20) + "px";
  heart.style.animationDuration = (Math.random()*6+6) + "s";
  heart.style.top = "-50px";
  heart.style.color = `hsl(${Math.random()*360}, 100%, 80%)`;
  heart.style.transform = `rotate(${Math.random()*360}deg)`;
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),12000);
}

// меньше сердечек, примерно в 2–3 раза
setInterval(createHeart,900);
setInterval(createHeart,900);
setInterval(createHeart,900);

</script>

</body>
</html>
